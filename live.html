<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BrideFlix Live</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html,body{

width:100%;
height:100%;

overflow:hidden;

background:#000;

font-family:Montserrat,sans-serif;

}

#background{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-size:cover;
background-position:center;

filter:blur(35px) brightness(.25);

transform:scale(1.2);

transition:1.5s;

}

#container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;

flex-direction:column;

align-items:center;

width:92%;

height:90%;

z-index:2;

}

#foto{

max-width:88%;

max-height:68vh;

border-radius:22px;

box-shadow:
0 30px 90px rgba(0,0,0,.55);

object-fit:contain;

animation:zoom 10s linear forwards;

transition:opacity 1.2s;

}

#dedica{

margin-top:40px;

max-width:1100px;

padding:28px 40px;

background:rgba(20,20,20,.35);

backdrop-filter:blur(18px);

border-left:6px solid #ff2d95;

border-radius:22px;

color:white;

text-align:center;

opacity:0;

transform:translateY(30px);

transition:all 1s;

}

#messaggio{

font-family:"Playfair Display",serif;

font-size:44px;

line-height:1.4;

}

#nome{

margin-top:20px;

font-size:24px;

opacity:.8;

}

@keyframes zoom{

from{

transform:scale(1);

}

to{

transform:scale(1.08);

}

}

#waiting{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

text-align:center;

color:white;

z-index:10;

animation:fadeIn 2s ease;

}

#waiting h1{

font-family:"Playfair Display",serif;

font-size:72px;

font-weight:700;

margin-bottom:20px;

}

#waiting h2{

font-size:36px;

font-weight:300;

margin-bottom:30px;

opacity:.9;

}

#waiting p{

font-size:24px;

opacity:.75;

line-height:1.5;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translate(-50%,-45%);

}

to{

opacity:1;

transform:translate(-50%,-50%);

}

}

</style>

</head>

<body>

<div id="background"></div>

<div id="waiting">

    <h1>Emanuela ❤️ Lucia</h1>

    <h2>Condividi i tuoi ricordi</h2>

    <p>
        Scatta una foto, lascia una dedica
        e diventa parte del nostro film.
    </p>

</div>

<div id="container">

<img id="foto">

<div id="dedica">

<div id="messaggio"></div>

<div id="nome"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>

<script src="live.js"></script>

</body>

</html>
