<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invia una dedica</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="upload-page">

<h1>📸 Condividi un ricordo</h1>

<p>
Carica una foto e lascia una dedica alle spose ❤️
</p>

<input
type="text"
id="nome"
placeholder="Il tuo nome">

<textarea
id="messaggio"
placeholder="Scrivi una dedica..."></textarea>

<input
type="file"
id="foto"
accept="image/*">

<button id="invia">
INVIA
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>

<script src="upload.js"></script>

</body>
</html>
