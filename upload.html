<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Emanuela ❤️ Lucia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="upload.css">

</head>

<body>

<div class="background"></div>

<div class="flowers flowers-left"></div>
<div class="flowers flowers-right"></div>

<div class="card">

    <a href="ricordi.html" class="galleryButton">
        📸 Guarda i Ricordi
    </a>

    <h1>Emanuela ❤️ Lucia</h1>

    <h2>Share Your Memories</h2>

    <p class="subtitle">
        Ogni fotografia racconta un'emozione.<br>
        Condividete con noi il vostro ricordo di questa giornata speciale.
    </p>

   <label class="upload-box" for="foto">

    <div id="previewContainer">

        <img id="preview" style="display:none;">

        <div id="placeholder">

            <div class="camera">📸</div>

            <strong>Scegli una o più foto</strong>

            <span>Tocca qui per selezionarle</span>

        </div>

    </div>

</label>

<div id="selectedCount"></div>

<input
    type="file"
    id="foto"
    accept="image/*"
    multiple
    style="display:none;">

    <div class="field">

        <label for="nome">Il tuo nome</label>

        <input
            type="text"
            id="nome"
            maxlength="40"
            placeholder="Scrivi il tuo nome">

    </div>

    <div class="field">

        <label for="messaggio">La tua dedica</label>

        <textarea
            id="messaggio"
            maxlength="300"
            placeholder="Scrivi una dedica alle spose..."></textarea>

        <div id="counter">
            0 / 300
        </div>

    </div>

    <button id="invia">
        ❤️ Invia la dedica
    </button>

</div>

<script>

const foto = document.getElementById("foto");
const preview = document.getElementById("preview");
const placeholder = document.getElementById("placeholder");

foto.addEventListener("change", () => {

    const files = foto.files;

    if (files.length === 0) return;

  preview.src = URL.createObjectURL(files[0]);
preview.style.display = "block";

placeholder.style.display = "none";

document.getElementById("selectedCount").textContent =
    `${files.length} foto selezionate`;

});

const txt = document.getElementById("messaggio");
const counter = document.getElementById("counter");

txt.addEventListener("input", () => {

    counter.textContent = txt.value.length + " / 300";

});

</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="upload.js"></script>

</body>
</html>
