<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ricordi del nostro giorno</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#141414;
    color:white;
    font-family:Montserrat,sans-serif;
    padding:60px;
}

h1{
    font-family:"Playfair Display",serif;
    font-size:54px;
    margin-bottom:15px;
}

.subtitle{
    opacity:.7;
    margin-bottom:50px;
    font-size:22px;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
    gap:35px;
}

.card{
    background:#1f1f1f;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 10px 35px rgba(0,0,0,.35);
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.content{
    padding:25px;
}

.message{
    font-size:22px;
    line-height:1.6;
    font-family:"Playfair Display",serif;
    margin-bottom:25px;
}

.author{
    text-align:right;
    opacity:.8;
    font-size:18px;
}

.date{
    margin-top:15px;
    font-size:14px;
    opacity:.55;
    text-align:right;
}

/* ==========================
   VIEWER
========================== */

#viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    padding:40px;
}

#viewerImage{

    max-width:85%;

    max-height:65vh;

    border-radius:20px;

    box-shadow:0 20px 80px rgba(0,0,0,.6);

    cursor:pointer;

    transition:.25s;
    
    opacity:1;
transition:opacity .25s;

}

#viewerImage:hover{

    transform:scale(1.01);

}
#viewerInfo{
    margin-top:35px;
    max-width:900px;
    text-align:center;
}

#viewerMessage{
    font-size:34px;
    font-family:"Playfair Display",serif;
    line-height:1.5;
}

#viewerAuthor{
    margin-top:25px;
    font-size:22px;
    opacity:.8;
}

#viewerDate{
    margin-top:10px;
    opacity:.5;
}

#closeViewer{
    position:absolute;
    top:30px;
    right:40px;
    font-size:50px;
    cursor:pointer;
    color:white;
    user-select:none;
    transition:.25s;
}

#closeViewer:hover{
    transform:scale(1.15);
}

#viewerCounter{

    position:absolute;

    top:35px;

    left:40px;

    padding:10px 18px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(10px);

    border-radius:30px;

    font-size:16px;

    font-weight:600;

    letter-spacing:.5px;

    color:white;

}

.viewerArrow{

    position:absolute;

    top:50%;

    transform:translateY(-50%);

    font-size:70px;

    color:white;

    cursor:pointer;

    user-select:none;

    opacity:.55;

    transition:.25s;

    padding:20px;

}

.viewerArrow:hover{

    opacity:1;

    transform:translateY(-50%) scale(1.15);

}

#prevPhoto{

    left:25px;

}

#nextPhoto{

    right:25px;

}

.activeCard{

    animation:cardGlow 1.2s ease;

}

@keyframes cardGlow{

    0%{

        transform:scale(1);

        box-shadow:0 0 0 rgba(255,255,255,0);

    }

    40%{

        transform:scale(1.05);

        box-shadow:0 0 40px rgba(255,255,255,.9);

    }

    100%{

        transform:scale(1);

        box-shadow:0 10px 35px rgba(0,0,0,.35);

    }

}

/* ==========================
   PULSANTE CARICA FOTO
========================== */

.upload-bar{

    margin:25px 0 35px;

}

.uploadButton{

    display:inline-flex;
    align-items:center;
    gap:14px;

    padding:16px 32px;

    border-radius:50px;

    text-decoration:none;

    background:linear-gradient(135deg,#ff2d75,#ff5da2);

    color:#fff;

    font-size:20px;

    font-weight:700;

    box-shadow:0 10px 30px rgba(255,45,117,.35);

    transition:.25s;

}

.uploadButton:hover{

    transform:translateY(-3px);

    box-shadow:0 18px 40px rgba(255,45,117,.45);

}

.uploadButton:active{

    transform:scale(.97);

}

.uploadButton::before{

    content:"📸";

    font-size:22px;

}


</style>

</head>

<body>

<h1>❤️ Ricordi del nostro giorno</h1>

<div class="upload-bar">

    <a href="upload.html" class="uploadButton">
        <span class="icon">📸</span>
        <span>Carica le tue foto</span>
    </a>

</div>

<div class="subtitle">
Le fotografie e le dediche condivise dai nostri ospiti.
</div>

<div id="gallery"></div>

<!-- POPUP -->

<div id="viewer">

    <span id="closeViewer">✕</span>

    <div id="viewerCounter"></div>

    <div id="prevPhoto" class="viewerArrow">❮</div>

    <img id="viewerImage" alt="Ricordo">

    <div id="nextPhoto" class="viewerArrow">❯</div>

    <div id="viewerInfo">

        <div id="viewerMessage"></div>

        <div id="viewerAuthor"></div>

        <div id="viewerDate"></div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="ricordi.js"></script>

</body>

</html>
